apiVersion: 1

datasources:
  - name: CloudSentry PostgreSQL
    type: postgres
    uid: cloudsentry-postgres
    access: proxy
    url: postgres:5432
    database: cloudsentry
    user: cloudsentry
    secureJsonData:
      password: ${DB_PASSWORD:-cloudsentry_dev}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
    editable: true
