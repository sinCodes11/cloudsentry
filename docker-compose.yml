version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cloudsentry-db
    environment:
      POSTGRES_USER: cloudsentry
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cloudsentry_dev}
      POSTGRES_DB: cloudsentry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudsentry"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.0
    container_name: cloudsentry-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:

networks:
  default:
    name: cloudsentry-network
