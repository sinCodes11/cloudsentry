<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bgCs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="accentCs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#0088cc"/>
    </linearGradient>
    <linearGradient id="scanlineCs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="glowCs"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowStrongCs"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clipCs"><rect width="900" height="200" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#clipCs)">
    <rect width="900" height="200" rx="16" fill="url(#bgCs)"/>
    <rect width="900" height="200" rx="16" fill="none" stroke="#0088cc" stroke-width="1" opacity="0.2"/>
    <rect x="0" y="0" width="900" height="200" fill="url(#scanlineCs)" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </rect>
    <g transform="translate(60,100)">
      <g filter="url(#glowCs)">
        <ellipse cx="0" cy="10" rx="55" ry="30" fill="none" stroke="url(#accentCs)" stroke-width="1.5" opacity="0.6"/>
        <path d="M-60,10 Q-40,-40 0,-30 Q30,-20 40,-45 Q50,-55 60,-40" fill="none" stroke="#1a3a5a" stroke-width="2"/>
        <path d="M0-20 L0-5" stroke="url(#accentCs)" stroke-width="1.5" opacity="0.4"/>
        <g opacity="0.15">
          <rect x="-45" y="20" width="12" height="8" rx="2" fill="#00d4aa">
            <animate attributeName="height" values="8;15;8" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="y" values="20;13;20" dur="2s" repeatCount="indefinite"/>
          </rect>
          <rect x="-25" y="15" width="12" height="13" rx="2" fill="#0088cc">
            <animate attributeName="height" values="13;8;13" dur="1.5s" repeatCount="indefinite"/>
            <animate attributeName="y" values="15;20;15" dur="1.5s" repeatCount="indefinite"/>
          </rect>
          <rect x="-5" y="10" width="12" height="18" rx="2" fill="#00d4aa">
            <animate attributeName="height" values="18;12;18" dur="2.5s" repeatCount="indefinite"/>
            <animate attributeName="y" values="10;16;10" dur="2.5s" repeatCount="indefinite"/>
          </rect>
          <rect x="15" y="18" width="12" height="10" rx="2" fill="#0088cc">
            <animate attributeName="height" values="10;16;10" dur="1.8s" repeatCount="indefinite"/>
            <animate attributeName="y" values="18;12;18" dur="1.8s" repeatCount="indefinite"/>
          </rect>
          <rect x="33" y="22" width="12" height="6" rx="2" fill="#00d4aa">
            <animate attributeName="height" values="6;12;6" dur="2.2s" repeatCount="indefinite"/>
            <animate attributeName="y" values="22;16;22" dur="2.2s" repeatCount="indefinite"/>
          </rect>
        </g>
      </g>
      <circle cx="0" cy="-35" r="40" fill="none" stroke="#00d4aa" stroke-width="0.5" opacity="0">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.08;0.03;0.08" dur="4s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(180,60)">
      <text x="0" y="0" font-family="monospace" font-size="42" font-weight="bold" fill="#00d4aa" filter="url(#glowStrongCs)">
        CloudSentry
        <animate attributeName="opacity" values="1;0.9;1" dur="2s" repeatCount="indefinite"/>
      </text>
      <text x="0" y="0" font-family="monospace" font-size="42" font-weight="bold" fill="#00d4aa" opacity="0.2">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="0.05s" repeatCount="indefinite"/>
        CloudSentry
      </text>
      <text x="0" y="30" font-family="monospace" font-size="13" fill="#888" letter-spacing="3">OCI SECURITY POSTURE MONITOR</text>
      <text x="0" y="50" font-family="monospace" font-size="11" fill="#666" letter-spacing="1">CSPM · CIS BENCHMARK · GRAFANA · SLACK ALERTS</text>
    </g>
    <g transform="translate(780, 170)" opacity="0.35">
      <text font-family="monospace" font-size="9" fill="#00d4aa">OCI</text>
    </g>
  </g>
</svg>