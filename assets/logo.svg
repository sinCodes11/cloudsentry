<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#0088cc"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="32" fill="url(#bg)"/>
  <g transform="translate(100,95)">
    <path d="M-60,10 Q-40,-40 0,-30 Q30,-20 40,-45 Q50,-55 60,-40" fill="none" stroke="#1a3a5a" stroke-width="2"/>
    <ellipse cx="0" cy="10" rx="55" ry="30" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
    <path d="M0-20 L0-5" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
    <g stroke="url(#accent)" stroke-width="1" opacity="0.3" fill="none">
      <path d="M-20-15 L-15-10"/>
      <path d="M20-15 L15-10"/>
      <path d="M-25-5 L-18-2"/>
      <path d="M25-5 L18-2"/>
    </g>
    <g filter="url(#glow)">
      <circle cx="-40" cy="-15" r="2" fill="#00d4aa"><animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/></circle>
      <circle cx="-15" cy="-25" r="2" fill="#00d4aa"><animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="15" cy="-28" r="2" fill="#00d4aa"><animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="45" cy="-30" r="2" fill="#00d4aa"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></circle>
    </g>
    <g opacity="0.15">
      <rect x="-45" y="20" width="12" height="8" rx="2" fill="#00d4aa">
        <animate attributeName="height" values="8;15;8" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="20;13;20" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="-25" y="15" width="12" height="13" rx="2" fill="#0088cc">
        <animate attributeName="height" values="13;8;13" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="15;20;15" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="-5" y="10" width="12" height="18" rx="2" fill="#00d4aa">
        <animate attributeName="height" values="18;12;18" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="10;16;10" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="15" y="18" width="12" height="10" rx="2" fill="#0088cc">
        <animate attributeName="height" values="10;16;10" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="18;12;18" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="33" y="22" width="12" height="6" rx="2" fill="#00d4aa">
        <animate attributeName="height" values="6;12;6" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="22;16;22" dur="2.2s" repeatCount="indefinite"/>
      </rect>
    </g>
    <circle cx="0" cy="-35" r="40" fill="none" stroke="#00d4aa" stroke-width="0.5" opacity="0.08">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
